name: Deploy to Render

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy hook
        run: |
          curl -s --fail \
            "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -X POST
